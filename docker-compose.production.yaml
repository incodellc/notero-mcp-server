services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: notero-mcp
    ports:
      - '3001:3001'
    env_file:
      - .env.production
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3001/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
