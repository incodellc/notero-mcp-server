name: Deploy infrastructure

on:
  workflow_dispatch:
    inputs:
      enable_route53_record:
        description: Create mcp.notero.ai Route53 record (requires notero.ai hosted zone in AWS)
        required: false
        default: false
        type: boolean
      apply:
        description: Apply Terraform changes (false = plan only)
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform plan and apply
    runs-on: ubuntu-latest
    concurrency:
      group: notero-mcp-terraform
      cancel-in-progress: true
    defaults:
      run:
        working-directory: terraform

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_key_name: ${{ secrets.EC2_KEY_NAME }}
      TF_VAR_environment: production
      TF_VAR_enable_route53_record: ${{ inputs.enable_route53_record }}
      TF_VAR_route53_zone_name: notero.ai
      TF_VAR_route53_record_name: mcp.notero.ai
      TF_VAR_alarm_notification_email: ${{ secrets.ALARM_NOTIFICATION_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Print deployment outputs
        if: inputs.apply
        run: terraform output
